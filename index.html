        :root {
            --bg-color: #000000;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            margin: 0;
            padding: 3rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 320px;
        }

        .profile {
            text-align: center;
            margin-bottom: 24px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }

        p.bio {
            font-size: 16px;
            color: var(--text-secondary);
            margin: 0;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            color: var(--text-primary);
            background-color: var(--btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: var(--btn-hover);
            border-color: #8b949e;
        }

        .btn svg {
            fill: currentColor;
            width: 16px;
            height: 16px;
        }
    </style>
</head>
